name: Release-plz

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  pull-requests: write
  contents: write
  packages: write

jobs:
  # Manual trigger: creates/updates a release PR.
  release-pr:
    if: github.event_name == 'workflow_dispatch'
    name: Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup tools with mise
        uses: jdx/mise-action@v2

      - name: Run release-plz
        run: release-plz release-pr
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Tag push: publishes to crates.io and creates GitHub release.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup tools with mise
        uses: jdx/mise-action@v2

      - name: Run release-plz
        run: release-plz release
        env:
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
