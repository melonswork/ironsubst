name: Release-plz

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  pull-requests: write
  contents: write
  packages: write

jobs:
  # Manual trigger: creates/updates a release PR.
  release-pr:
    if: github.event_name == 'workflow_dispatch' && github.repository_owner == 'melonswork'
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - &mise
        name: Setup tools with mise
        uses: jdx/mise-action@v4

      - name: Run release-plz release-pr
        uses: release-plz/action@v0.5
        with:
           command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Tag push: publishes to crates.io and creates GitHub release.
  release:
    if: startsWith(github.ref, 'refs/tags/') && github.repository_owner == 'melonswork'
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - *checkout

      - *mise

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
