name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  MISE_TRUSTED_CONFIG_PATHS: ${{ github.workspace }}
  MISE_LOCKFILE: 1

jobs:
  mise-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
    - &checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - &rust-cache
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        shared-key: "ironsubst"
        save-if: ${{ github.ref == 'refs/heads/master' }}
    - &rustup-cache
      name: Cache Rust toolchain components
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: ~/.rustup/toolchains
        key: rustup-${{ runner.os }}-${{ hashFiles('mise.lock') }}
    - &mise
      name: Setup tools with mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
    - &rust-components # workaround for https://github.com/jdx/mise-action/issues/184 - locally, mise does well without it
      name: Install Rust components
      run: rustup component add rustfmt clippy llvm-tools-preview

  test:
    needs: mise-cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Format check
      run: |
        mise run format:check
        echo "- Format ✅" >> $GITHUB_STEP_SUMMARY
    - name: Clippy
      run: |
        mise run lint:check
    - &test
      name: Tests
      run: |
        mise run test

  test-macos:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
    - *checkout
    - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      with:
        shared-key: "ironsubst-macos"
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Build release
      run: mise run release
    - *test

  coverage:
    needs: mise-cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Generate coverage report
      run: mise run coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Summary
      run: echo "Coverage uploaded to [Codecov](https://app.codecov.io/gh/melonswork/ironsubst)" >> $GITHUB_STEP_SUMMARY

  security-audit:
    needs: mise-cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - name: Cargo audit
      run: mise run audit
    - name: Snyk
      if: github.repository_owner == 'melonswork' # forks won't have the token
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        mise run snyk-test

  bench:
    needs: mise-cache
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - name: Benchmark
      run: mise run bench -- --no-date >> $GITHUB_STEP_SUMMARY
    - name: Size comparison
      run: mise run size-compare >> $GITHUB_STEP_SUMMARY
    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: bench-results
        path: |
          bench-results.json
          bench-results.csv
        retention-days: 90

  final:
    needs: [test, test-macos, coverage, security-audit, bench]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    if: always()
    steps:
    - name: Check all jobs passed
      run: |
        results=(
          "test=${{ needs.test.result }}"
          "test-macos=${{ needs.test-macos.result }}"
          "coverage=${{ needs.coverage.result }}"
          "security-audit=${{ needs.security-audit.result }}"
          "bench=${{ needs.bench.result }}"
        )
        failed=0
        for r in "${results[@]}"; do
          name="${r%%=*}"; result="${r##*=}"
          if [ "$result" != "success" ]; then
            echo "$name: $result"
            failed=1
          fi
        done
        [ $failed -eq 0 ] && echo "All jobs passed" || exit 1
