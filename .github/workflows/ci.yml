name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Check formatting
      run: mise run format:check
    - name: Run clippy
      run: mise run lint:check
    - name: Run tests
      run: mise run test
