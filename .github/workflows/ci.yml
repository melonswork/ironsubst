name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-${{ hashFiles('mise.toml') }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst"
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Format check
      run: mise run format:check
    - name: Clippy
      run: mise run lint:check
    - name: Tests
      run: mise run test
    - name: Summary
      if: always()
      run: |
        echo "## Tests" >> $GITHUB_STEP_SUMMARY
        echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| Format | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| Clippy | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit + Integration | ✅ |" >> $GITHUB_STEP_SUMMARY

  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-macos-${{ hashFiles('mise.toml') }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst-macos"
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Build release
      run: mise run release
    - name: Tests
      run: mise run test

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-${{ hashFiles('mise.toml') }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst"
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Generate coverage report
      run: mise exec -- cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: lcov.info
        fail_ci_if_error: false
    - name: Summary
      if: always()
      run: |
        echo "## Coverage" >> $GITHUB_STEP_SUMMARY
        echo "Uploaded to [Codecov](https://app.codecov.io/gh/melonswork/ironsubst)" >> $GITHUB_STEP_SUMMARY

  security-audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-${{ hashFiles('mise.toml') }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst"
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Cargo audit
      run: mise run audit
    - name: Snyk
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: mise run snyk-test
    - name: Summary
      if: always()
      run: |
        echo "## Security" >> $GITHUB_STEP_SUMMARY
        echo "| Scanner | Result |" >> $GITHUB_STEP_SUMMARY
        echo "|---|---|" >> $GITHUB_STEP_SUMMARY
        echo "| cargo-audit | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| snyk | ✅ |" >> $GITHUB_STEP_SUMMARY

  bench:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      with:
        path: ~/.local/share/mise
        key: mise-${{ hashFiles('mise.toml') }}
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst"
    - name: Setup tools with mise
      uses: jdx/mise-action@v2
    - name: Benchmark
      run: mise run bench -- --warmup 50 --runs 500 --no-date >> $GITHUB_STEP_SUMMARY
    - name: Size comparison
      run: mise run size-compare >> $GITHUB_STEP_SUMMARY
    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v4
      with:
        name: bench-results
        path: |
          bench-results.json
          bench-results.csv
        retention-days: 90
