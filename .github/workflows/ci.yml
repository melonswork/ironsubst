name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  mise-cache:
    runs-on: ubuntu-latest
    steps:
    - &checkout
      uses: actions/checkout@v6
    - &rust-cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst"
    - &rustup-cache
      name: Cache Rust toolchain components
      uses: actions/cache@v4
      with:
        path: ~/.rustup/toolchains
        key: rustup-${{ runner.os }}-${{ hashFiles('mise.toml') }}
    - &mise
      name: Setup tools with mise
      uses: jdx/mise-action@v4
    - &rust-components # workaround for https://github.com/jdx/mise-action/issues/184 - locally, mise does well without it
      name: Install Rust components
      run: rustup component add rustfmt clippy llvm-tools-preview

  test:
    needs: mise-cache
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Format check
      run: |
        mise run format:check
        echo "- Format ✅" >> $GITHUB_STEP_SUMMARY
    - name: Clippy
      run: |
        mise run lint:check
    - &test
      name: Tests
      run: |
        mise run test

  test-macos:
    runs-on: macos-latest
    steps:
    - *checkout
    - uses: Swatinem/rust-cache@v2
      with:
        shared-key: "ironsubst-macos"
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Build release
      run: mise run release
    - *test

  coverage:
    needs: mise-cache
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - *rust-components
    - name: Generate coverage report
      run: mise run coverage
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Summary
      run: echo "Coverage uploaded to [Codecov](https://app.codecov.io/gh/melonswork/ironsubst)" >> $GITHUB_STEP_SUMMARY

  security-audit:
    needs: mise-cache
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - name: Cargo audit
      run: mise run audit
    - name: Snyk
      if: github.repository_owner == 'melonswork' # forks won't have the token
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        mise run snyk-test

  bench:
    needs: mise-cache
    runs-on: ubuntu-latest
    steps:
    - *checkout
    - *rust-cache
    - *rustup-cache
    - *mise
    - name: Benchmark
      run: mise run bench -- --no-date >> $GITHUB_STEP_SUMMARY
    - name: Size comparison
      run: mise run size-compare >> $GITHUB_STEP_SUMMARY
    - name: Upload benchmark artifacts
      uses: actions/upload-artifact@v7
      with:
        name: bench-results
        path: |
          bench-results.json
          bench-results.csv
        retention-days: 90
