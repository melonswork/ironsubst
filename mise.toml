[tools]
python = "latest"
envsubst = "latest"
rust = { version = "latest", components = ["rustfmt", "clippy", "llvm-tools-preview"] }
hyperfine = "latest"
hk = "latest"
pkl = "latest"
vhs = "latest"
git-cliff = "latest"
act = "latest"
snyk = "latest"
"cargo:release-plz" = "latest"
"cargo:cargo-cyclonedx" = "latest"
"cargo:cargo-llvm-cov" = "latest"
gh = "latest"

[tasks]
"run" = "cargo run --"
"release" = "cargo build --release -q"
"test" = "cargo test"
"format:check" = "cargo fmt -- --check"
"format:fix" = "cargo fmt"
"lint:check" = "cargo clippy -- -D warnings"
"lint:fix" = "cargo clippy --fix --allow-dirty --allow-staged"

[tasks.changelog]
description = "Generate CHANGELOG.md"
run = "git cliff -o CHANGELOG.md"

[tasks.demo]
description = "Generate vhs demo"
run = "cargo build --release -q && PATH=$PWD/target/release:$PATH vhs < demo.tape"

[tasks.example]
run = "cargo run -q -- -i example.txt"
env = { IRON_SET = "hello_world", IRON_EMPTY = "" }

[tasks.bench]
description = "Compare performance with a8m/envsubst"
env = { IRON_SET = "hello_world", IRON_EMPTY = "" }
usage = '''
flag "--warmup <n>" help="Number of warmup runs" default="100"
flag "--runs <n>" help="Number of benchmark runs" default="2000"
flag "--export-dir <dir>" help="Directory for result files" default="."
flag "--no-date" help="Skip appending date to result filenames"
'''
run = """
#!/usr/bin/env bash
set -e
mise run release

if [ "${usage_no_date:-false}" = "true" ]; then
  SUFFIX=""
else
  SUFFIX="-$(date +%Y%m%d)"
fi

OUT="${usage_export_dir:?}"
mkdir -p "$OUT"

hyperfine -N \
  --warmup "${usage_warmup:?}" \
  --runs "${usage_runs:?}" \
  --style full \
  --export-json "$OUT/bench-results${SUFFIX}.json" \
  --export-csv "$OUT/bench-results${SUFFIX}.csv" \
  --export-markdown "$OUT/bench-results${SUFFIX}.md" \
  -n "ironsubst" "target/release/ironsubst -i example.txt" \
  -n "envsubst" "envsubst -i example.txt"

cat "$OUT/bench-results${SUFFIX}.md"
"""

[tasks.size-compare]
description = "Compare release binary size of ironsubst vs a8m/envsubst (outputs markdown to stdout)"
run = """
#!/usr/bin/env bash
set -e
mise run release

IRON_BIN="target/release/ironsubst"
ENVSUBST_BIN="$(which envsubst)"

IRON_SIZE=$(wc -c < "$IRON_BIN" | tr -d ' ')
ENVSUBST_SIZE=$(wc -c < "$ENVSUBST_BIN" | tr -d ' ')

IRON_KB=$(echo "scale=1; $IRON_SIZE / 1024" | bc)
ENVSUBST_KB=$(echo "scale=1; $ENVSUBST_SIZE / 1024" | bc)

DIFF=$((ENVSUBST_SIZE - IRON_SIZE))
PCT=$(echo "scale=1; $DIFF * 100 / $ENVSUBST_SIZE" | bc)

echo "### Binary size"
echo "| Tool | Size |"
echo "|---|---|"
echo "| ironsubst | ${IRON_KB} KB (${IRON_SIZE} bytes) |"
echo "| envsubst | ${ENVSUBST_KB} KB (${ENVSUBST_SIZE} bytes) |"
echo "| ironsubst is **${PCT}% smaller** (${DIFF} bytes saved) | |"
"""

[tasks.hooks]
description = "Install hk git hooks (run once after cloning)"
run = "hk install"

[tasks.test-gha]
description = "Run CI workflow locally via act"
run = """
#!/usr/bin/env bash
set -e
if ! gh auth token &>/dev/null; then
  gh auth login
fi
act -j test -s GITHUB_TOKEN=$(gh auth token)
"""

[tasks.lint-gha]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.compare]
description = "Generate comparison.md table of substitution tool behavior"
run = "python3 compare.py"

[tasks.snyk-test]
description = "Run Snyk security scan via CycloneDX SBOM"
run = """
#!/usr/bin/env bash
set -e
mise exec -- cargo cyclonedx -f json --override-filename sbom
mise exec snyk -- snyk sbom test --file=sbom.json
rm sbom.json
"""

[tasks.fuzz-parse]
description = "Fuzz the parser (requires nightly)"
usage = '''
flag "--max-total-time <secs>" help="Stop after N seconds" default="0"
flag "--max-runs <n>" help="Stop after N iterations"
'''
run = """
#!/usr/bin/env bash
set -e
FUZZ_ARGS=()
[ "${usage_max_total_time:?}" != "0" ] && FUZZ_ARGS+=(-max_total_time="${usage_max_total_time?}")
[ -n "${usage_max_runs:-}" ] && FUZZ_ARGS+=(-max_runs="${usage_max_runs?}")
cargo +nightly fuzz run fuzz_parse -- "${FUZZ_ARGS[@]}"
"""

[tasks.fuzz-process]
description = "Fuzz the full process pipeline (requires nightly)"
usage = '''
flag "--max-total-time <secs>" help="Stop after N seconds" default="0"
flag "--max-runs <n>" help="Stop after N iterations"
'''
run = """
#!/usr/bin/env bash
set -e
FUZZ_ARGS=()
[ "${usage_max_total_time:?}" != "0" ] && FUZZ_ARGS+=(-max_total_time="${usage_max_total_time?}")
[ -n "${usage_max_runs:-}" ] && FUZZ_ARGS+=(-max_runs="${usage_max_runs?}")
cargo +nightly fuzz run fuzz_process -- "${FUZZ_ARGS[@]}"
"""

[tasks.audit]
description = "Run cargo-audit supply chain security check"
run = "cargo audit"

[tasks.completions]
description = "Generate shell completions to ./completions/"
run = """
#!/usr/bin/env bash
set -e
mise run release
mkdir -p completions
target/release/ironsubst completions bash  > completions/ironsubst.bash
target/release/ironsubst completions zsh   > completions/_ironsubst
target/release/ironsubst completions fish  > completions/ironsubst.fish
echo "Completions written to ./completions/"
"""

[tasks.man]
description = "Generate man page to ./man/ironsubst.1"
run = """
#!/usr/bin/env bash
set -e
mise run release
mkdir -p man
target/release/ironsubst --generate-man-page > man/ironsubst.1
echo "Man page written to ./man/ironsubst.1"
"""
