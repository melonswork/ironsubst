[tools]
envsubst = "latest"
rust = "latest"
hyperfine = "latest"
hk = "latest"
pkl = "latest"
vhs = "latest"
git-cliff = "latest"
act = "latest"
snyk = "latest"
"cargo:release-plz" = "latest"
gh = "latest"

[tasks]
"run" = "cargo run --"
"release" = "cargo build --release -q"
"test" = "cargo test"
"format:check" = "cargo fmt -- --check"
"format:fix" = "cargo fmt"
"lint:check" = "cargo clippy -- -D warnings"
"lint:fix" = "cargo clippy --fix --allow-dirty --allow-staged"

[tasks.changelog]
description = "Generate CHANGELOG.md"
run = "git cliff -o CHANGELOG.md"

[tasks.demo]
description = "Generate vhs demo"
run = "cargo build --release -q && PATH=$PWD/target/release:$PATH vhs < demo.tape"

[tasks.example]
run = "cargo run -q -- -i example.txt"
env = { IRON_SET = "hello_world", IRON_EMPTY = "" }

[tasks.bench]
description = "Compare performance with a8m/envsubst"
env = { IRON_SET = "hello_world", IRON_EMPTY = "" }
run = """
#!/usr/bin/env bash
set -e
mise run release
results_file="bench-results.md"
hyperfine -N \
  --warmup 100 \
  --runs 2000 \
  --style full \
  --export-markdown "$results_file" \
  -n "ironsubst (Rust)" "target/release/ironsubst -i example.txt" \
  -n "envsubst (Go)" "envsubst -i example.txt"
cat "$results_file"
"""

[tasks.parity-test]
description = "Compare ironsubst vs a8m/envsubst output side-by-side (differences are expected and documented)"
env = { IRON_SET = "hello_world", IRON_EMPTY = "" }
run = """
#!/usr/bin/env bash

FILE="${1:-example.txt}"

if [ ! -f "$FILE" ]; then
    echo "Error: file '$FILE' not found."
fi

echo "Building ironsubst..."
cargo build -q 2>&1

OUT_IRON=$(mktemp)
OUT_ENV=$(mktemp)
trap 'rm -f "$OUT_IRON" "$OUT_ENV"' EXIT

target/debug/ironsubst -i "$FILE" > "$OUT_IRON"
envsubst -i "$FILE" > "$OUT_ENV"

echo ""
echo "================================================================"
echo "  ironsubst vs a8m/envsubst comparison for: $FILE"
echo "================================================================"
echo ""

if diff -u --label "a8m/envsubst" --label "ironsubst" "$OUT_ENV" "$OUT_IRON"; then
    echo "No differences — outputs are identical for this file."
else
    echo ""
    echo "----------------------------------------------------------------"
    echo "  Known intentional divergences:"
    echo ""
    echo '  ${VAR:+alt}  ironsubst: POSIX-correct — fires only when VAR is'
    echo '                           set AND non-empty.'
    echo '               a8m:       fires whenever VAR is set (even if empty)'
    echo '                          — this is a bug in a8m/envsubst.'
    echo ''
    echo '  ${VAR+alt}   both tools agree: fires whenever VAR is set (even'
    echo '                                  if empty).'
    echo "----------------------------------------------------------------"
fi
"""

[tasks.hooks]
description = "Install hk git hooks (run once after cloning)"
run = "hk install"

[tasks.test-gha]
description = "Run CI workflow locally via act"
run = """
#!/usr/bin/env bash
set -e
if ! gh auth token &>/dev/null; then
  gh auth login
fi
act -j test -s GITHUB_TOKEN=$(gh auth token)
"""

[tasks.lint-gha]
description = "Lint GitHub Actions workflows"
run = "actionlint"

[tasks.snyk-test]
description = "Run Snyk security scan"
run = "mise exec snyk -- snyk test"

[tasks.fuzz-parse]
description = "Fuzz the parser (requires nightly: rustup override set nightly)"
run = "cargo +nightly fuzz run fuzz_parse"

[tasks.fuzz-process]
description = "Fuzz the full process pipeline (requires nightly)"
run = "cargo +nightly fuzz run fuzz_process"

[tasks.audit]
description = "Run cargo-audit supply chain security check"
run = "cargo audit"

[tasks.completions]
description = "Generate shell completions to ./completions/"
run = """
#!/usr/bin/env bash
set -e
mise run release
mkdir -p completions
target/release/ironsubst completions bash  > completions/ironsubst.bash
target/release/ironsubst completions zsh   > completions/_ironsubst
target/release/ironsubst completions fish  > completions/ironsubst.fish
echo "Completions written to ./completions/"
"""

[tasks.man]
description = "Generate man page to ./man/ironsubst.1"
run = """
#!/usr/bin/env bash
set -e
mise run release
mkdir -p man
target/release/ironsubst --generate-man-page > man/ironsubst.1
echo "Man page written to ./man/ironsubst.1"
"""
