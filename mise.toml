[tools]
envsubst = "latest"
rust = "latest"
hyperfine = "latest"
hk = "latest"
pkl = "latest"

[tasks]
"run" = "cargo run --"
"release" = "cargo build --release -q"
"test" = "cargo test"
"format:check" = "cargo fmt -- --check"
"format:fix" = "cargo fmt"
"lint:check" = "cargo clippy -- -D warnings"
"lint:fix" = "cargo clippy --fix --allow-dirty --allow-staged"

[tasks.example]
run = "cargo run -q -- -i example.txt"
env = { IRONSUBST_SET = "hello_world", IRONSUBST_EMPTY = "" }

[tasks.bench]
description = "Compare performance with a8m/envsubst"
env = { IRONSUBST_SET = "hello_world", IRONSUBST_EMPTY = "" }
run = """
#!/usr/bin/env bash
set -e
mise run release
results_file="bench-results.md"
hyperfine -N \
  --warmup 100 \
  --runs 2000 \
  --style full \
  --export-markdown "$results_file" \
  -n "ironsubst (Rust)" "target/release/ironsubst -i example.txt" \
  -n "envsubst (Go)" "envsubst -i example.txt"
cat "$results_file"
"""

[tasks.parity-test]
description = "Verify that ironsubst and a8m/envsubst produce identical output"
env = { IRONSUBST_SET = "hello_world", IRONSUBST_EMPTY = "" }
run = """
#!/usr/bin/env bash
set -e

FILE="${1:-example.txt}"

if [ ! -f "$FILE" ]; then
    echo "Error: file '$FILE' not found."
    exit 1
fi

echo "Building ironsubst..."
cargo build -q

OUT_MEL=$(mktemp)
OUT_ENV=$(mktemp)

target/debug/ironsubst -i "$FILE" > "$OUT_MEL"
envsubst -i "$FILE" > "$OUT_ENV"

if diff -u "$OUT_ENV" "$OUT_MEL"; then
    echo "✅ Parity test passed! Both tools produced identical output for '$FILE'."
else
    echo "❌ Parity test failed! Outputs differ for '$FILE'."
    rm -f "$OUT_MEL" "$OUT_ENV"
    exit 1
fi

rm -f "$OUT_MEL" "$OUT_ENV"
"""
